name: Chorus Artifacts

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform artifact set to build
        type: choice
        options:
          - all
          - macos
          - linux
        default: all
  pull_request:
    types:
      - labeled
      - synchronize

permissions:
  contents: read

concurrency:
  group: chorus-artifacts-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  linux_bundle:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux')) ||
      (github.event_name == 'pull_request' && (
        (github.event.action == 'labeled' && github.event.label.name == 'build-artifacts') ||
        (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build-artifacts'))
      ))
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          clean: false

      - name: Install Linux dependencies
        run: ./script/linux

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Linux bundle
        run: ./script/bundle-linux --app-only

      - name: Upload Linux bundle
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: chorus-linux-x86_64
          path: target/release/chorus-linux-x86_64.tar.gz
          if-no-files-found: error

  linux_remote_server_archive:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')) ||
      (github.event_name == 'pull_request' && (
        (github.event.action == 'labeled' && github.event.label.name == 'build-artifacts') ||
        (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build-artifacts'))
      ))
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          clean: false

      - name: Install Linux dependencies
        run: ./script/linux

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Linux remote server archive
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu --package remote_server
          gzip -f --stdout --best target/x86_64-unknown-linux-gnu/release/remote_server > target/chorus-remote-server-linux-x86_64.gz

      - name: Upload Linux remote server archive
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: chorus-remote-server-linux-x86_64
          path: target/chorus-remote-server-linux-x86_64.gz
          if-no-files-found: error

  macos_bundle:
    needs: linux_remote_server_archive
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos')) ||
      (github.event_name == 'pull_request' && (
        (github.event.action == 'labeled' && github.event.label.name == 'build-artifacts') ||
        (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build-artifacts'))
      ))
    runs-on: macos-15-xlarge
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          clean: false

      - name: Install macOS build dependencies
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! brew list cmake >/dev/null 2>&1; then
            brew install cmake
          fi
          if ! brew list zig >/dev/null 2>&1; then
            brew install zig
          fi
          if ! cargo zigbuild --help >/dev/null 2>&1; then
            cargo install --locked cargo-zigbuild
          fi
          cargo --version

      - name: Configure macOS SDK environment
        run: |
          sdk_root="$(xcrun --sdk macosx --show-sdk-path)"
          echo "SDKROOT=$sdk_root" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=--sysroot=$sdk_root" >> "$GITHUB_ENV"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Download Linux remote server archive
        uses: actions/download-artifact@v4
        with:
          name: chorus-remote-server-linux-x86_64
          path: target/remote-servers-prebuilt

      - name: Build macOS app bundle
        env:
          CHORUS_PREBUILT_REMOTE_SERVER_ARCHIVES_DIR: target/remote-servers-prebuilt
        run: ./script/bundle-mac -a aarch64-apple-darwin

      - name: Archive macOS app bundle
        run: |
          app_path="$(find target -type d -path '*/release/bundle/osx/*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "Could not locate the macOS app bundle"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" target/chorus-macos-aarch64-app.zip

      - name: Upload macOS app bundle
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: chorus-macos-aarch64-app
          path: target/chorus-macos-aarch64-app.zip
          if-no-files-found: error
